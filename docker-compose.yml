services:
  postgres:
    image: postgres:16-alpine
    container_name: aramen-pos-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: aramen_pos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
